
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ラーメン屋店長のすごい12選 — 一杯入魂ストーリー</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    overflow: hidden;
  }
  #stage {
    position: relative;
    width: 540px;
    height: 960px;
    background: #fdf5e4;
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
  }
  #stage::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg,   transparent, transparent 30px, rgba(180,140,80,.06) 30px, rgba(180,140,80,.06) 31px),
      repeating-linear-gradient(90deg,  transparent, transparent 30px, rgba(180,140,80,.06) 30px, rgba(180,140,80,.06) 31px);
    z-index: 0;
    pointer-events: none;
  }
  .scene {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(1.04);
    transition: opacity .45s ease, transform .45s ease;
    z-index: 1;
    padding: 32px 28px;
    text-align: center;
  }
  .scene.active {
    opacity: 1;
    transform: scale(1);
  }
  #scene-intro {
    background: linear-gradient(160deg, #3d1f0a 0%, #7a3810 60%, #c06020 100%);
    color: #fdf5e4;
  }
  #scene-intro .main-title {
    font-size: 2.6rem;
    font-weight: 900;
    letter-spacing: .12em;
    line-height: 1.3;
    text-shadow: 0 2px 8px rgba(0,0,0,.6);
  }
  #scene-intro .sub-title {
    font-size: 1.1rem;
    margin-top: 16px;
    opacity: .85;
    letter-spacing: .1em;
  }
  #scene-intro .stamp {
    margin-top: 28px;
    width: 90px; height: 90px;
    border: 4px solid #e8c060;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    color: #e8c060;
    font-weight: 900;
    letter-spacing: .05em;
    text-shadow: 0 0 8px rgba(232,192,96,.5);
    animation: stampPulse 1.2s ease-in-out infinite alternate;
  }
  @keyframes stampPulse { from { box-shadow: 0 0 6px #e8c060; } to { box-shadow: 0 0 22px #e8c060; } }
  .scene-card {
    background: rgba(253,245,228,.97);
    border-radius: 16px;
    width: 100%;
  }
</style>
</head>
<body>
<div id="stage">
  <div id="scene-intro" class="scene active">
    <div class="main-title">ラーメン屋店長の<br>すごい12選</div>
    <div class="sub-title">一杯入魂ストーリー</div>
    <div class="stamp">魂</div>
  </div>
</div>
</body>
</html>
